<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>接口健康巡检控制台</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0f172a;
    color:#e2e8f0;
}
header{
    padding:20px;
    background:#1e293b;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
h1{margin:0;font-size:20px;}
button{
    padding:6px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#3b82f6;
    color:#fff;
}
button.danger{background:#ef4444;}
button.secondary{background:#334155;}
main{padding:20px;}
.card-container{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}
.card{
    flex:1;
    background:#1e293b;
    padding:15px;
    border-radius:8px;
}
.card h3{margin:0 0 5px 0;font-size:14px;color:#94a3b8;}
.card p{font-size:24px;margin:0;}
table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
    margin-top:10px;
}
th,td{
    padding:8px;
    border-bottom:1px solid #334155;
    font-size:14px;
}
th{color:#94a3b8;}
tr:hover{background:#334155;}
.badge{
    padding:3px 6px;
    border-radius:4px;
    font-size:12px;
}
.ok{background:#16a34a;}
.fail{background:#dc2626;}
form{
    background:#1e293b;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
}
input,select{
    padding:6px;
    margin-right:10px;
    border-radius:4px;
    border:1px solid #334155;
    background:#0f172a;
    color:#fff;
}
</style>
</head>

<body>

<header>
    <h1>接口健康巡检控制台</h1>
    <button class="secondary" onclick="loadAll()">刷新数据</button>
</header>

<main>

<div class="card-container">
    <div class="card">
        <h3>已登记接口</h3>
        <p id="cApis">0</p>
    </div>
    <div class="card">
        <h3>最近巡检记录</h3>
        <p id="cChecks">0</p>
    </div>
    <div class="card">
        <h3>异常次数</h3>
        <p id="cError">0</p>
    </div>
</div>

<form id="addForm">
    <h3>新增巡检接口</h3>
    <input type="text" id="name" placeholder="名称" required>
    <input type="url" id="url" placeholder="URL" required>
    <select id="method">
        <option value="GET">GET</option>
        <option value="POST">POST</option>
    </select>
    <button type="submit">添加</button>
</form>

<h3>接口列表</h3>
<div id="apiTable"></div>

<h3>最近巡检记录</h3>
<div id="checkTable"></div>

</main>

<script>

async function fetchJSON(url, options={}){
    const res = await fetch(url, options);
    if(!res.ok) throw new Error("请求失败");
    return await res.json();
}

async function loadAll(){
    try{
        const apis = await fetchJSON("/api/apis");
        const checks = await fetchJSON("/api/checks");

        document.getElementById("cApis").innerText = apis.length;
        document.getElementById("cChecks").innerText = checks.length;

        const errorCount = checks.filter(c=>c.IsError).length;
        document.getElementById("cError").innerText = errorCount;

        renderApis(apis);
        renderChecks(checks);
    }catch(e){
        alert("加载失败："+e.message);
    }
}

function renderApis(apis){
    if(apis.length===0){
        document.getElementById("apiTable").innerHTML="暂无接口";
        return;
    }

    let html="<table><tr><th>ID</th><th>名称</th><th>URL</th><th>方法</th><th>操作</th></tr>";

    apis.forEach(api=>{
        html+=`
        <tr>
            <td>${api.ID}</td>
            <td>${api.Name}</td>
            <td>${api.URL}</td>
            <td>${api.Method}</td>
            <td>
                <button class="danger" onclick="deleteApi(${api.ID})">删除</button>
            </td>
        </tr>`;
    });

    html+="</table>";
    document.getElementById("apiTable").innerHTML=html;
}

function renderChecks(checks){
    if(checks.length===0){
        document.getElementById("checkTable").innerHTML="暂无记录";
        return;
    }

    let html="<table><tr><th>URL</th><th>状态码</th><th>耗时(ms)</th><th>结果</th><th>时间</th></tr>";

    checks.forEach(c=>{
        html+=`
        <tr>
            <td>${c.URL}</td>
            <td>${c.StatusCode}</td>
            <td>${c.CostTime}</td>
            <td>
                <span class="badge ${c.IsError?'fail':'ok'}">
                ${c.IsError?'异常':'正常'}
                </span>
            </td>
            <td>${new Date(c.CheckedAt).toLocaleString()}</td>
        </tr>`;
    });

    html+="</table>";
    document.getElementById("checkTable").innerHTML=html;
}

async function deleteApi(id){
    if(!confirm("确认删除？")) return;
    await fetchJSON("/api/apis/"+id,{method:"DELETE"});
    loadAll();
}

document.getElementById("addForm").addEventListener("submit",async function(e){
    e.preventDefault();

    const data={
        name:document.getElementById("name").value,
        url:document.getElementById("url").value,
        method:document.getElementById("method").value
    };

    await fetchJSON("/api/apis",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(data)
    });

    this.reset();
    loadAll();
});

loadAll();
setInterval(loadAll,15000);

</script>

</body>
</html>
