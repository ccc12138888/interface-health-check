global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "interface-health-check"

scrape_configs:
  # Scrape Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape the Go application's /metrics endpoint
  - job_name: healthcheck-app
    static_configs:
      - targets: ["app:8080"]
    metrics_path: /metrics

  # Optional: scrape MySQL Exporter if you add it later
  # - job_name: mysql-exporter
  #   static_configs:
  #     - targets: ["mysql-exporter:9104"]
